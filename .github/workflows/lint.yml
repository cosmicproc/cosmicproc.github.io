name: Lint
on:
  push:
    branches: [$default-branch]
    paths:
      - "**.py"
      - "**.css"
  pull_request:
    branches: [$default-branch]
    paths:
      - "**.py"
      - "**.css"
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        run: |
          ruff check --output-format=github .
  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          npm ci --include=dev
      - name: Run stylelint
        run: |
          npx stylelint -f github "**/*.css"
